<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | San Lorenzo Tenochtitlán</title>
    <link rel="stylesheet" href="style.css?v=4">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(28, 40, 51, 0.6), rgba(28, 40, 51, 0.9)), url('hero.png') center/cover no-repeat;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-card h2 {
            color: var(--clay-red);
            margin-bottom: 5px;
        }
        .login-card p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: inherit;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Acceso Restringido</h2>
            <p>Ingresa tus credenciales para administrar el portal</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario / Correo</label>
                    <input type="text" id="username" placeholder="ej: admin / gestor" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div id="google_translate_element" style="visibility:hidden; height:0; overflow:hidden; position:absolute;"></div>
                <div id="loginError" class="error-msg">Credenciales incorrectas. Intenta de nuevo.</div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Ingresar al Panel</button>
            </form>
            
            <div style="margin-top: 20px;">
                <a href="index.html" style="color: var(--jungle-green); text-decoration: none; font-size: 0.9rem;">← Volver al portal público</a>
            </div>
        </div>
    </div>

    <script src="app.js?v=4"></script>
    <script type="module" src="firebase-app.js?v=6"></script>
</body>
</html>
